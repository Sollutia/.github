name: Reset labels (central)

on:
  workflow_call:
    inputs:
      labels_url:
        required: false
        type: string
        default: "https://raw.githubusercontent.com/ORG/.github/main/labels/labels.yml"

permissions:
  issues: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Download labels manifest
        run: |
          curl -fsSL "${{ inputs.labels_url }}" -o labels.yml

      - name: Reset labels (delete all)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, { owner, repo, per_page: 100 });
            for (const l of labels) {
              try {
                await github.rest.issues.deleteLabel({ owner, repo, name: l.name });
                core.info(`Deleted: ${l.name}`);
              } catch (e) {
                core.warning(`Can't delete "${l.name}": ${e.message}`);
              }
            }

      - name: Create labels from YAML
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const content = fs.readFileSync("labels.yml", "utf8");
            const blocks = content.split("\n- ").map((b, i) => i === 0 ? b.trim() : "- " + b.trim()).filter(Boolean);

            function getField(block, field) {
              const re = new RegExp(`\\b${field}:\\s*["']?(.+?)["']?\\s*$`, "m");
              const m = block.match(re);
              return m ? m[1].trim() : null;
            }

            const { owner, repo } = context.repo;
            const labels = blocks.map(b => ({
              name: getField(b, "name"),
              color: (getField(b, "color") || "").replace("#",""),
              description: getField(b, "description") || ""
            })).filter(l => l.name && l.color);

            for (const l of labels) {
              await github.rest.issues.createLabel({ owner, repo, ...l });
              core.info(`Created: ${l.name}`);
            }
