name: 🐛 Bug report
description: Reportar un error o comportamiento inesperado
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ###
        ## 🐛 Reporte de Bug
        Describe el problema con el mayor detalle posible.
        ###

  - type: textarea
    id: description
    attributes:
      label: Descripción del problema
      description: Explica qué está ocurriendo.
      placeholder: Describe el error...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Indica paso a paso cómo reproducir el problema.
      placeholder: |
        1. Ir a...
        2. Hacer click en...
        3. Ver error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: ¿Qué debería ocurrir?
      placeholder: El sistema debería...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      description: ¿Qué está ocurriendo realmente?
      placeholder: Actualmente ocurre que...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Mensajes de error
      description: Copia aquí cualquier log o mensaje relevante.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Entorno
      description: Información del entorno donde ocurre el problema.
      placeholder: |
        - OS:
        - Navegador:
        - Versión app:
        - Entorno (dev / staging / prod):
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Prioridad
      description: Indica el impacto del bug.
      options:
        - 🔴 Urgente (bloquea funcionalidad)
        - 🟠 Alta
        - 🟡 Normal
        - 🟢 Baja
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmación
      description: Antes de enviar, confirma lo siguiente.
      options:
        - label: He verificado que no existe ya una issue similar.
          required: true
        - label: He proporcionado información suficiente para reproducir el problema.
          required: true
